# H100 CI calibration layout — sglang-h100-ci profile
#
# Used by tune.py on the shared H100 host. Calibration may run in **any**
# container on the machine that sees the full GPU set — it does **not** have
# to be the dedicated 2-GPU CI repro container (`--gpus device=6,7`).
#
# Override at runtime (no repo edits required):
#   export TUNE_HOST=sglang-h100-ci
#   export TUNE_REPO_ROOT=/path/to/worktree   # git worktree or checkout
#   export TUNE_VENV_PYTHON=/path/to/omni/bin/python
#   export TUNE_GPU_EXCLUDE=6,7               # CI-reserved GPUs on 8× hosts

name: sglang-h100-ci
hostname: sglang-h100-ci

# Default checkout; override with $TUNE_REPO_ROOT for worktrees.
repo_root: /data/sglang-omni
venv_python: /github/home/calibration/omni/bin/python

# On 8× H100 shared hosts, GPU 6–7 run CI continuously — never pick or kill them.
gpu_exclude: [6, 7]

physical:
  hf_hub: /root/.cache/huggingface
  speaker_sim: /root/.cache/huggingface/speaker_sim
  omni_ci_home: /github/home/calibration

precheck_checklist:
  repo_root_exists: /data/sglang-omni/pyproject.toml
  venv_exists: /github/home/calibration/omni/bin/python
  hf_hub: /root/.cache/huggingface
  speaker_sim:
    dir: /root/.cache/huggingface/speaker_sim
    files: [wavlm_large.pt, wavlm_large_finetune.pth, .complete]
  omni_ci_home: /github/home/calibration
  tune_py:
    - "python .claude/skills/tune-ci-thresholds/tune.py --model asr precheck --output-dir /tmp/precheck_asr"
    - "python .claude/skills/tune-ci-thresholds/tune.py --model tts precheck --output-dir /tmp/precheck_tts"
    - "python .claude/skills/tune-ci-thresholds/tune.py --model omni precheck --output-dir /tmp/precheck_omni"

speaker_similarity_bootstrap:
  warm_cache:
    env:
      HF_ENDPOINT: https://huggingface.co
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      SEEDTTS_SIM_CACHE_DIR: /root/.cache/huggingface/speaker_sim
    hf_token: "source ~/.zshrc"
    command: |
      cd "${TUNE_REPO_ROOT:-/data/sglang-omni}"
      "${TUNE_VENV_PYTHON:-/github/home/calibration/omni/bin/python}" -m benchmarks.metrics.speaker_similarity_assets --warm-cache

agent_policy:
  env_check: report_missing_first
  poll_interval_max_s: 120

handoff:
  goal: "Full CI calibration — asr ALL r5, then tts ALL r5, then omni ALL r5"
  speaker_sim_complete: false
  calibration_started: false
  run_dirs: []
